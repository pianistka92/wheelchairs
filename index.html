<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wheelchair Station</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00c2ff;
    --accent2: #ff6b35;
    --green: #00e5a0;
    --yellow: #ffd166;
    --text: #e8f0fe;
    --muted: #5a7a99;
    --danger: #ff4466;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,194,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,194,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 120px; }

  .header {
    background: linear-gradient(135deg, #0d1b2e 0%, #0a1628 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #0077cc);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px rgba(0,194,255,0.3);
  }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { font-size: 10px; color: var(--muted); font-weight: 400; letter-spacing: 1px; text-transform: uppercase; }

  .tag-control {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }
  .tag-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); white-space: nowrap; }
  .tag-input-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .tag-btn {
    width: 28px; height: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: monospace;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .tag-btn:active { background: var(--accent); border-color: var(--accent); transform: scale(0.92); }
  .tag-num-input {
    width: 54px;
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
  }
  .tag-num-input::-webkit-outer-spin-button,
  .tag-num-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .next-banner {
    margin: 16px 16px 0;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }
  .next-banner-inner {
    background: linear-gradient(135deg, #003355, #001a33);
    border: 1px solid rgba(0,194,255,0.3);
    border-radius: 16px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .next-banner-inner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(0,194,255,0.15), transparent 70%);
    border-radius: 50%;
  }
  .next-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent);
    margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
  }
  .pulse-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .next-name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: #fff; line-height: 1; }
  .next-details { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .next-chip {
    background: rgba(0,194,255,0.1);
    border: 1px solid rgba(0,194,255,0.2);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
  }
  .next-empty { color: var(--muted); font-size: 15px; font-weight: 400; font-style: italic; }

  .tabs {
    display: flex;
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .tab {
    flex: 1; padding: 9px 8px;
    background: transparent;
    border: none; border-radius: 9px;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .section { padding: 16px; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .form-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .form-hint { font-size: 11px; color: var(--muted); margin-bottom: 16px; }
  .form-hint span { color: var(--accent2); }

  .field { margin-bottom: 14px; }
  .field label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted);
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .optional-badge {
    font-size: 9px; text-transform: none; letter-spacing: 0;
    background: rgba(255,107,53,0.12); color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.25); border-radius: 4px;
    padding: 1px 5px; font-weight: 600;
  }
  .required-either-badge {
    font-size: 9px; text-transform: none; letter-spacing: 0;
    background: rgba(0,194,255,0.1); color: var(--accent);
    border: 1px solid rgba(0,194,255,0.2); border-radius: 4px;
    padding: 1px 5px; font-weight: 600;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .field input.error { border-color: var(--danger); }

  .wc-row { display: flex; align-items: center; gap: 12px; }
  .wc-btn {
    width: 44px; height: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .wc-btn:active { transform: scale(0.9); background: var(--accent); }
  .wc-count {
    font-size: 28px; font-weight: 700; min-width: 40px; text-align: center;
    font-family: 'DM Mono', monospace; color: var(--accent);
  }

  .submit-btn {
    width: 100%; margin-top: 6px;
    background: linear-gradient(135deg, var(--accent), #0077cc);
    border: none; border-radius: 12px;
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 15px;
    cursor: pointer;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 20px rgba(0,194,255,0.25);
    transition: all 0.2s;
  }
  .submit-btn:active { transform: scale(0.97); box-shadow: none; }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: #001a0f;
    font-weight: 700; font-size: 14px;
    padding: 12px 24px; border-radius: 40px;
    opacity: 0; transition: all 0.3s;
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .queue-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .queue-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .queue-count {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
    font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent);
  }

  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .queue-item.eligible {
    border-color: rgba(0,229,160,0.3);
    background: linear-gradient(135deg, rgba(0,229,160,0.05), var(--surface));
  }
  .queue-item.eligible::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green);
    border-radius: 3px 0 0 3px;
  }
  .queue-item.next-up {
    border-color: rgba(0,194,255,0.5);
    background: linear-gradient(135deg, rgba(0,194,255,0.08), var(--surface));
    box-shadow: 0 0 20px rgba(0,194,255,0.1);
  }
  .queue-item.next-up::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
  }

  .rank {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--muted);
    width: 22px; text-align: center; flex-shrink: 0;
  }
  .rank.first { color: var(--accent); font-weight: 700; font-size: 13px; }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .item-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 10px; font-family: 'DM Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 2px 8px; color: var(--muted);
  }
  .meta-chip.tag-chip { color: var(--yellow); border-color: rgba(255,209,102,0.2); background: rgba(255,209,102,0.05); }
  .meta-chip.cabin-chip { color: #c084fc; border-color: rgba(192,132,252,0.2); background: rgba(192,132,252,0.05); }
  .meta-chip.eligible-chip { color: var(--green); border-color: rgba(0,229,160,0.3); background: rgba(0,229,160,0.05); }
  .meta-chip.waiting-chip { color: var(--accent2); border-color: rgba(255,107,53,0.2); background: rgba(255,107,53,0.05); }

  .wc-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 700;
    color: var(--text); flex-shrink: 0;
  }
  .wc-badge span { font-size: 11px; color: var(--muted); font-weight: 400; }

  .delete-btn {
    width: 30px; height: 30px;
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .delete-btn:active { background: rgba(255,68,102,0.2); color: var(--danger); }

  .empty-state {
    text-align: center; padding: 50px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; }

  .served-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0.5;
  }
  .checkmark { font-size: 18px; }
  .served-name { font-size: 14px; font-weight: 600; flex: 1; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">♿</div>
        <div>
          <div class="logo-text">Wheelchair Station</div>
          <div class="logo-sub">Check-In System</div>
        </div>
      </div>
    </div>
    <div class="tag-control">
      <div class="tag-label">🏷 Current Luggage Tag</div>
      <div class="tag-input-wrap">
        <button class="tag-btn" onclick="adjustTag(-1)">−</button>
        <input class="tag-num-input" type="number" id="currentTag" value="0" min="0" onchange="updateTag()" oninput="updateTag()">
        <button class="tag-btn" onclick="adjustTag(1)">+</button>
      </div>
    </div>
  </div>

  <div class="next-banner">
    <div class="next-banner-inner" id="nextBanner">
      <div class="next-label"><div class="pulse-dot"></div> Next in Queue</div>
      <div class="next-empty">No one checked in yet</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('checkin', this)">Check In</button>
    <button class="tab" onclick="switchTab('queue', this)">Queue</button>
    <button class="tab" onclick="switchTab('served', this)">Served</button>
  </div>

  <div class="section" id="tab-checkin">
    <div class="form-card">
      <div class="form-title">New Check-In</div>
      <div class="form-hint">At least <span>Last Name</span> or <span>Cabin #</span> is required.</div>

      <div class="field">
        <label>Last Name <span class="required-either-badge">required if no cabin #</span></label>
        <input type="text" id="lastName" placeholder="e.g. Johnson" autocomplete="off" autocorrect="off" spellcheck="false">
      </div>

      <div class="field">
        <label>Cabin # <span class="optional-badge">optional</span></label>
        <input type="text" id="cabinNum" placeholder="e.g. 4412" autocomplete="off" inputmode="text">
      </div>

      <div class="field">
        <label>Luggage Tag #</label>
        <input type="number" id="tagNum" placeholder="e.g. 42" min="1" inputmode="numeric">
      </div>

      <div class="field">
        <label>Wheelchairs Needed</label>
        <div class="wc-row">
          <button class="wc-btn" onclick="adjustWC(-1)">−</button>
          <div class="wc-count" id="wcCount">1</div>
          <button class="wc-btn" onclick="adjustWC(1)">+</button>
        </div>
      </div>
      <button class="submit-btn" onclick="checkIn()">✓ Check In</button>
    </div>
  </div>

  <div class="section" id="tab-queue" style="display:none;">
    <div class="queue-header">
      <div class="queue-title">Active Queue</div>
      <div class="queue-count" id="queueCount">0</div>
    </div>
    <div id="queueList"></div>
  </div>

  <div class="section" id="tab-served" style="display:none;">
    <div class="queue-header">
      <div class="queue-title">Served Today</div>
      <div class="queue-count" id="servedCount">0</div>
    </div>
    <div id="servedList"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let queue = [];
  let served = [];
  let wcCount = 1;
  let currentTag = 0;
  let activeTab = 'checkin';

  function adjustTag(delta) {
    const el = document.getElementById('currentTag');
    const val = Math.max(0, parseInt(el.value || 0) + delta);
    el.value = val;
    currentTag = val;
    render();
  }

  function updateTag() {
    const val = parseInt(document.getElementById('currentTag').value) || 0;
    currentTag = Math.max(0, val);
    render();
  }

  function adjustWC(delta) {
    wcCount = Math.max(1, Math.min(10, wcCount + delta));
    document.getElementById('wcCount').textContent = wcCount;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function displayName(p) {
    if (p.lastName && p.cabinNum) return p.lastName + ' · Cabin ' + p.cabinNum;
    if (p.lastName) return p.lastName;
    return 'Cabin ' + p.cabinNum;
  }

  function isEligible(person) {
    return person.tagNum <= currentTag;
  }

  function getSortedQueue() {
    const eligible = queue.filter(isEligible).sort((a, b) => a.checkInTime - b.checkInTime);
    const waiting = queue.filter(p => !isEligible(p)).sort((a, b) => a.tagNum - b.tagNum);
    return [...eligible, ...waiting];
  }

  function checkIn() {
    const lastName = document.getElementById('lastName').value.trim();
    const cabinNum = document.getElementById('cabinNum').value.trim();
    const tagNum = parseInt(document.getElementById('tagNum').value);

    if (!lastName && !cabinNum) {
      document.getElementById('lastName').classList.add('error');
      document.getElementById('cabinNum').classList.add('error');
      showToast('⚠ Enter a last name or cabin #', '#ff6b35');
      setTimeout(() => {
        document.getElementById('lastName').classList.remove('error');
        document.getElementById('cabinNum').classList.remove('error');
      }, 2000);
      return;
    }

    if (!tagNum || tagNum < 1) {
      document.getElementById('tagNum').classList.add('error');
      showToast('⚠ Enter a valid tag number', '#ff6b35');
      setTimeout(() => document.getElementById('tagNum').classList.remove('error'), 2000);
      return;
    }

    const person = {
      id: Date.now() + Math.random(),
      lastName: lastName ? lastName.toUpperCase() : '',
      cabinNum: cabinNum ? cabinNum.toUpperCase() : '',
      tagNum,
      wheelchairs: wcCount,
      checkInTime: Date.now()
    };

    queue.push(person);
    document.getElementById('lastName').value = '';
    document.getElementById('cabinNum').value = '';
    document.getElementById('tagNum').value = '';
    wcCount = 1;
    document.getElementById('wcCount').textContent = '1';

    showToast('✓ ' + displayName(person) + ' checked in!');
    render();
  }

  function serveNext() {
    const sorted = getSortedQueue();
    if (sorted.length === 0) return;
    const next = sorted[0];
    queue = queue.filter(p => p.id !== next.id);
    served.unshift({ ...next, servedTime: Date.now() });
    showToast('♿ ' + displayName(next) + ' served!', 'var(--green)');
    render();
  }

  function removePerson(id) {
    queue = queue.filter(p => p.id !== id);
    render();
  }

  function render() {
    renderBanner();
    renderQueue();
    renderServed();
  }

  function renderBanner() {
    const banner = document.getElementById('nextBanner');
    const sorted = getSortedQueue();

    if (sorted.length === 0) {
      banner.innerHTML = `
        <div class="next-label"><div class="pulse-dot"></div> Next in Queue</div>
        <div class="next-empty">No one checked in yet</div>`;
      return;
    }

    const next = sorted[0];
    const eligible = isEligible(next);
    const cabinChip = next.cabinNum ? `<div class="next-chip" style="color:#c084fc;border-color:rgba(192,132,252,0.3)">Cabin ${next.cabinNum}</div>` : '';
    banner.innerHTML = `
      <div class="next-label"><div class="pulse-dot"></div> Next in Queue</div>
      <div class="next-name">${displayName(next)}</div>
      <div class="next-details">
        <div class="next-chip">Tag #${next.tagNum}</div>
        <div class="next-chip">♿ ${next.wheelchairs}</div>
        ${cabinChip}
        <div class="next-chip">${formatTime(next.checkInTime)}</div>
        ${eligible
          ? '<div class="next-chip" style="color:var(--green);border-color:rgba(0,229,160,0.3)">✓ Luggage Ready</div>'
          : '<div class="next-chip" style="color:var(--accent2)">⏳ Awaiting Luggage</div>'}
      </div>
      <button onclick="serveNext()" style="margin-top:14px;background:linear-gradient(135deg,var(--green),#00a070);border:none;border-radius:10px;color:#001a0f;font-family:Sora,sans-serif;font-size:13px;font-weight:700;padding:10px 20px;cursor:pointer;width:100%;">
        Mark as Served →
      </button>`;
  }

  function renderQueue() {
    const sorted = getSortedQueue();
    const list = document.getElementById('queueList');
    document.getElementById('queueCount').textContent = sorted.length;

    if (sorted.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">♿</div><div class="empty-text">Queue is empty</div></div>`;
      return;
    }

    list.innerHTML = sorted.map((p, i) => {
      const eligible = isEligible(p);
      const cls = i === 0 ? 'next-up' : (eligible ? 'eligible' : '');
      const cabinChip = p.cabinNum ? `<div class="meta-chip cabin-chip">Cabin ${p.cabinNum}</div>` : '';
      return `
        <div class="queue-item ${cls}">
          <div class="rank ${i === 0 ? 'first' : ''}">${i === 0 ? '→' : (i + 1)}</div>
          <div class="item-info">
            <div class="item-name">${displayName(p)}</div>
            <div class="item-meta">
              <div class="meta-chip tag-chip">Tag #${p.tagNum}</div>
              <div class="meta-chip">⏰ ${formatTime(p.checkInTime)}</div>
              ${cabinChip}
              ${eligible
                ? '<div class="meta-chip eligible-chip">✓ Ready</div>'
                : '<div class="meta-chip waiting-chip">⏳ Tag >' + currentTag + '</div>'}
            </div>
          </div>
          <div class="wc-badge">♿<span>×</span>${p.wheelchairs}</div>
          <button class="delete-btn" onclick="removePerson(${p.id})">✕</button>
        </div>`;
    }).join('');
  }

  function renderServed() {
    const list = document.getElementById('servedList');
    document.getElementById('servedCount').textContent = served.length;

    if (served.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-text">No one served yet</div></div>`;
      return;
    }

    list.innerHTML = served.map(p => {
      const cabinChip = p.cabinNum ? `<div class="meta-chip cabin-chip">Cabin ${p.cabinNum}</div>` : '';
      return `
        <div class="served-item">
          <div class="checkmark">✓</div>
          <div class="item-info">
            <div class="served-name">${displayName(p)}</div>
            <div class="item-meta">
              <div class="meta-chip tag-chip">Tag #${p.tagNum}</div>
              ${cabinChip}
              <div class="meta-chip">Served ${formatTime(p.servedTime)}</div>
            </div>
          </div>
          <div class="wc-badge">♿<span>×</span>${p.wheelchairs}</div>
        </div>`;
    }).join('');
  }

  function switchTab(tab, el) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-checkin').style.display = tab === 'checkin' ? '' : 'none';
    document.getElementById('tab-queue').style.display = tab === 'queue' ? '' : 'none';
    document.getElementById('tab-served').style.display = tab === 'served' ? '' : 'none';
    if (tab === 'queue') renderQueue();
    if (tab === 'served') renderServed();
  }

  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color || 'var(--green)';
    t.style.color = color ? '#fff' : '#001a0f';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
